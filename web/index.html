<!doctype html>
<html lang="en-IN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>Refurb Helpdesk</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6B7280;font-size:14px">
      Loading Refurb Helpdesk…
    </div>
  </div>

  <!-- React 18 via CDN + Babel standalone (matches prototype's zero-build approach) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

  <script src="./config.js"></script>
  <script src="./data.js"></script>
  <script type="text/babel" data-presets="react" src="./utils.js"></script>
  <script type="text/babel" data-presets="react" src="./api.js"></script>
  <script type="text/babel" data-presets="react" src="./screens/login.js"></script>
  <script type="text/babel" data-presets="react" src="./screens/mobile.js"></script>
  <script type="text/babel" data-presets="react" src="./screens/desktop.js"></script>
  <script type="text/babel" data-presets="react" src="./screens/team.js"></script>
  <script type="text/babel" data-presets="react" src="./app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>

  <!-- PWA utility button (mobile + standalone only) -->
  <style>
    #pwa-fab { position: fixed; left: auto; right: 12px; top: auto; bottom: 12px; z-index: 9999; display: none; touch-action: none; }
    #pwa-fab button.pwa-toggle {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: rgba(17,24,39,0.75); color: #fff; font-size: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25); cursor: grab;
      touch-action: none; user-select: none;
    }
    #pwa-fab button.pwa-toggle.dragging { cursor: grabbing; }
    #pwa-fab .pwa-menu {
      position: absolute; right: 0; bottom: 44px;
      background: #fff; border: 1px solid #E5E7EB; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); min-width: 160px;
      display: none; overflow: hidden;
    }
    #pwa-fab .pwa-menu.open { display: block; }
    #pwa-fab .pwa-menu button {
      display: block; width: 100%; text-align: left; background: none; border: none;
      padding: 10px 14px; font-size: 13px; color: #111827; cursor: pointer;
    }
    #pwa-fab .pwa-menu button:hover { background: #F3F4F6; }
    #pwa-fab .pwa-menu button:disabled { color: #9CA3AF; cursor: not-allowed; }
    @media (max-width: 900px) { #pwa-fab { display: block; } }
    @media (display-mode: standalone) { #pwa-fab { display: block; } }
  </style>
  <div id="pwa-fab">
    <div class="pwa-menu" id="pwa-menu">
      <button id="pwa-install" disabled>Install app</button>
      <button id="pwa-clear">Clear cache &amp; reload</button>
    </div>
    <button class="pwa-toggle" id="pwa-toggle" title="App options">⚙</button>
  </div>
  <script>
    (function () {
      let deferredPrompt = null;
      const fab     = document.getElementById('pwa-fab');
      const toggle  = document.getElementById('pwa-toggle');
      const menu    = document.getElementById('pwa-menu');
      const install = document.getElementById('pwa-install');
      const clear   = document.getElementById('pwa-clear');

      // ---- Draggable FAB (position persisted) ----
      const POS_KEY = 'pwa_fab_pos_v1';
      const applyPos = (x, y) => {
        const pad = 4;
        const w = fab.offsetWidth || 36, h = fab.offsetHeight || 36;
        x = Math.max(pad, Math.min(window.innerWidth  - w - pad, x));
        y = Math.max(pad, Math.min(window.innerHeight - h - pad, y));
        fab.style.left = x + 'px';
        fab.style.top  = y + 'px';
        fab.style.right = 'auto';
        fab.style.bottom = 'auto';
        // Flip menu upward if near bottom, rightward if near left
        const menuBelow = y < 200;
        const menuLeft  = x < 180;
        menu.style.bottom = menuBelow ? 'auto' : '44px';
        menu.style.top    = menuBelow ? '44px' : 'auto';
        menu.style.right  = menuLeft  ? 'auto' : '0';
        menu.style.left   = menuLeft  ? '0'    : 'auto';
      };
      try {
        const saved = JSON.parse(localStorage.getItem(POS_KEY) || 'null');
        if (saved && typeof saved.x === 'number') {
          requestAnimationFrame(() => applyPos(saved.x, saved.y));
        }
      } catch (e) {}
      window.addEventListener('resize', () => {
        const r = fab.getBoundingClientRect();
        if (fab.style.left) applyPos(r.left, r.top);
      });

      let drag = null;
      toggle.addEventListener('pointerdown', (e) => {
        const r = fab.getBoundingClientRect();
        drag = { dx: e.clientX - r.left, dy: e.clientY - r.top, moved: false, startX: e.clientX, startY: e.clientY };
        toggle.setPointerCapture(e.pointerId);
        toggle.classList.add('dragging');
      });
      toggle.addEventListener('pointermove', (e) => {
        if (!drag) return;
        if (!drag.moved && Math.hypot(e.clientX - drag.startX, e.clientY - drag.startY) < 5) return;
        drag.moved = true;
        applyPos(e.clientX - drag.dx, e.clientY - drag.dy);
      });
      const endDrag = (e) => {
        if (!drag) return;
        toggle.classList.remove('dragging');
        try { toggle.releasePointerCapture(e.pointerId); } catch (err) {}
        if (drag.moved) {
          const r = fab.getBoundingClientRect();
          try { localStorage.setItem(POS_KEY, JSON.stringify({ x: r.left, y: r.top })); } catch (err) {}
        }
        const wasDragged = drag.moved;
        drag = null;
        if (!wasDragged) menu.classList.toggle('open');
      };
      toggle.addEventListener('pointerup', endDrag);
      toggle.addEventListener('pointercancel', endDrag);

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        install.disabled = false;
        install.textContent = 'Install app';
      });
      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        install.disabled = true;
        install.textContent = 'Installed';
      });

      toggle.addEventListener('click', (e) => e.stopPropagation());
      document.addEventListener('click', (e) => {
        if (!fab.contains(e.target)) menu.classList.remove('open');
      });

      install.addEventListener('click', async () => {
        menu.classList.remove('open');
        if (!deferredPrompt) {
          alert('Install not available. On iOS: Share → Add to Home Screen. On Chrome: use the address-bar install icon.');
          return;
        }
        deferredPrompt.prompt();
        try { await deferredPrompt.userChoice; } catch (e) {}
        deferredPrompt = null;
        install.disabled = true;
      });

      clear.addEventListener('click', async () => {
        menu.classList.remove('open');
        if (!confirm('Clear cached app files and reload?')) return;
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } catch (e) {}
        location.reload();
      });
    })();
  </script>
</body>
</html>
